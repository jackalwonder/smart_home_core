type: custom:swipe-card
card_width: 300px
start_card: 1
style:
  top: 0%
  left: 0%
  width: 90%
  z-index: 3
parameters:
  slidesPerView: 1
  spaceBetween: 0
  grabCursor: true
  followFinger: true
  pagination: 
    type: none
  autoplay:
    delay: 6000
cards:


  - type: custom:mod-card
    style:
      .: |
        ha-card {
          padding: 3px !important;
        }
    card:
        type: vertical-stack
        cards:
          - type: custom:button-card
            styles:
              card:
                - font-weight: bold
                - line-height: 1.2
                - color: white
                - text-align: left
                - padding: 10px
                - border-radius: 10px
                - background-color: transparent !important
                - border: none
                - box-shadow: none
                - justify-content: center
                - align-items: center
                - width: 100%
                - margin-top: 45px
                - margin-left: 30px;
              custom_fields:
                time:
                  - font-size: 48px
                  - font-weight: 400
                  - text-align: left
                  - width: 100%
            custom_fields:
              time: |
                [[[ return states['sensor.current_time'].state; ]]]
            show_icon: false
          - type: custom:button-card
            styles:
              card:
                - font-weight: normal
                - line-height: 1.2
                - color: gray
                - text-align: left
                - padding: 10px
                - background-color: transparent !important
                - border: none
                - box-shadow: none
                - justify-content: flex-start
                - align-items: center
                - width: 100%
                - margin-top: "-30px"
                - margin-left: 30px;
              custom_fields:
                date:
                  - font-size: 20px
                  - font-weight: normal
                  - text-align: left
                  - width: 100%
            custom_fields:
              date: |
                [[[ return states['sensor.current_date'].state; ]]]
            show_icon: false
          - show_current: true
            show_forecast: false
            type: weather-forecast
            entity: weather.chengdu
            forecast_type: hourly
            theme: transparent
          - type: custom:button-card
            name: 湿度
            entity: sensor.chengdu_humidity
            styles:
              card:
                - padding: 10px
                - border-radius: 10px
                - height: auto
                - border: none
                - box-shadow: none
                - margin-top: "-20px"
                - background-color: transparent !important
              grid:
                - grid-template-areas: "\"n value\" \"bar bar\""
                - grid-template-rows: auto 20px
                - grid-template-columns: 1fr auto
              name:
                - justify-self: start
                - font-size: 14px
                - color: rgba(255, 255, 255, 0.7)
                - font-weight: bold
              custom_fields:
                value:
                  - justify-self: end
                  - font-size: 14px
                  - color: rgba(255, 255, 255, 0.7)
                bar:
                  - height: 8px
                  - background-color: rgba(255, 255, 255, 0.2)
                  - border-radius: 4px
                  - overflow: hidden
            custom_fields:
              value: |
                [[[ 
                  if (entity && entity.state) {
                    return `${entity.state}%`;  // 显示湿度数值
                  }
                  return 'N/A';  // 如果状态无效，显示“不可用”
                ]]]
              bar: |
                [[[ 
                  if (entity && entity.state) {
                    const value = parseFloat(entity.state);
                    return `<div style="width: ${value}%; height: 100%; background-color: rgba(255, 255, 255, 0.7);"></div>`;  // 填充透明度为 70%
                  }
                  return `<div style="width: 0%; height: 100%; background-color: rgba(255, 255, 255, 0.3);"></div>`;  // 未填充部分透明度为 30%
                ]]]
          - type: custom:button-card
            name: 降雨量
            entity: sensor.chengdu_precipitation
            styles:
              card:
                - padding: 10px
                - border-radius: 10px
                - height: auto
                - border: none
                - box-shadow: none
                - margin-top: "-20px"
                - background-color: transparent !important
              grid:
                - grid-template-areas: "\"n value\" \"bar bar\""
                - grid-template-rows: auto 20px
                - grid-template-columns: 1fr auto
              name:
                - justify-self: start
                - font-size: 14px
                - color: rgba(255, 255, 255, 0.7)
                - font-weight: bold
              custom_fields:
                value:
                  - justify-self: end
                  - font-size: 14px
                  - color: rgba(255, 255, 255, 0.7)
                bar:
                  - height: 8px
                  - background-color: rgba(255, 255, 255, 0.2)
                  - border-radius: 4px
                  - overflow: hidden
            custom_fields:
              value: |
                [[[ 
                  if (entity && entity.state) {
                    return `${entity.state} mm`;  // 显示降雨量数值，单位为毫米
                  }
                  return 'N/A';  // 如果状态无效，显示“不可用”
                ]]]
              bar: |
                [[[ 
                  if (entity && entity.state) {
                    const value = parseFloat(entity.state);  // 转换降雨量为数值
                    const percentage = Math.min((value / 50) * 100, 100);  // 将降雨量映射为百分比，假设最大值为 50mm
                    return `<div style="width: ${percentage}%; height: 100%; background-color: rgba(255, 255, 255, 0.7);"></div>`;  // 填充为白色，透明度 70%
                  }
                  return `<div style="width: 0%; height: 100%; background-color: rgba(255, 255, 255, 0.3);"></div>`;  // 未填充部分透明度为 30%
                ]]]
          - type: horizontal-stack
            cards:
              - graph: line
                type: sensor
                entity: sensor.xiaomi_cn_blt_3_1lubuvk9t0k00_mini_temperature_p_2_1001
                detail: 2
                theme: transparent
                grid_options:
                  columns: 12
                  rows: 2.9
                card_mod:
                  style: |
                    ha-card {
                      --accent-color: #49b7e8; /* 修改线条颜色为蓝色 */
                      border-radius: 0 !important; /* 取消圆角 */
                    }
              - graph: line
                type: sensor
                entity: sensor.xiaomi_cn_blt_3_1lubuvk9t0k00_mini_relative_humidity_p_2_1002
                detail: 2
                name: 室外湿度
                theme: transparent
                grid_options:
                  columns: 12
                  rows: 2.9
                card_mod:
                  style: |
                    ha-card {
                      --accent-color: #ef8f05; /* 修改线条颜色为蓝色 */
                      border-radius: 0 !important; /* 取消圆角 */
                    }
          - graph: line
            type: sensor
