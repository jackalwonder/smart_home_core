
- type: picture-elements
  image: local/ui/light_on_bg/lights_off.png?v={{now()}}
  card_mod:
    style: |
      :host {
        --ha-card-background: none;
      }
  elements:
############## bar #######################################
    - type: custom:button-card
      style:
        left: 50%
        top: 105%
      styles:
        grid:
          - grid-template-areas: |
              "z1 bar1 bar2 bar3 bar4 bar5"
          - grid-template-columns: 20px 80px 00px 80px 80px 80px
          - grid-template-rows: 5px
        card:
          - '--mdc-ripple-press-opacity': 0
          - width: 360px
          - height: 40px
          - background-color: rgba(0,0,0,0.3)
          - border-radius: 20px
          - box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.5); /* 可选：阴影效果 */
      custom_fields:
        bar1:
          card:
            type: custom:button-card
            entity: sensor.all_lights_num
            layout: icon_name
            show_icon: true
            show_name: true
            show_state: true
            icon: mdi:lightbulb-group
            name: 灯光
            hold_action:
              action: call-service
              service: script.toggle_lights_unified
              service_data:
                lights:
                  - light.can_ting_tong_deng_switch
                  - light.shu_fang_deng_switch
                  - light.can_ting_xi_ding_deng_switch
                  - light.chu_fang_xi_ding_deng_switch
                  - light.ke_ting_tong_deng_1_switch
                  - light.ke_ting_tong_deng_2_switch
                  - light.lang_deng_switch
                  - light.ke_ting_deng_dai_switch
                  - light.zhu_wo_deng_dai_switch
                  - light.ke_wo_deng_switch
                  - light.ci_wo_deng_switch
                  - light.zhu_wei_ding_deng_switch
                  - light.zhu_wei_jing_deng_switch
                  - light.ke_wei_jing_deng_switch
                  - light.ke_wei_ding_deng_switch
                  - light.ke_ting_zhu_deng_switch
            double_tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.yi_jian_guan_bi_suo_you_deng
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  timeout: 5000
                  card_mod:
                    style: |
                      ha-dialog {
                        --mdc-dialog-min-width: 200px !important;
                        --mdc-dialog-max-width: 90% !important;
                        --dialog-surface-margin-top: 40px; !important;
                      }
                  content:
                    type: grid
                    columns: 4
                    square: false
                    cards:
                      - type: custom:button-card
                        entity: switch.lemesh_sw0c01_1a01_switch
                        show_state: false
                        show_name: true
                        show_label: true
