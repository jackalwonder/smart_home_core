type: picture-elements
image: local/ui/light_on_bg/lights_off.png?v={{now()}}
card_mod:
  style: |
    :host {
      --ha-card-background: none;
      height: 100% !important;
      max-height: 100% !important;
      overflow: hidden !important;
      position: relative !important;
    }
    ha-card {
      height: 100% !important;
      max-height: 100% !important;
      overflow: hidden !important;
    }
elements:
################################全屏按钮##################################
  - type: custom:button-card
    entity: input_boolean.full_screen
    show_name: false
    show_state: false
    icon: >
      [[[ return entity.state === "on" ? "mdi:fullscreen-exit" :
      "mdi:fullscreen"; ]]]
    tap_action:
      action: toggle
    styles:
      card:
        - width: 60px
        - height: 60px
        - background: transparent
        - box-shadow: none
      icon:
        - color: var(--primary-color)
      custom_fields:
        icon:
          - justify-self: center
    style:
      left: 5%
      top: 95%
