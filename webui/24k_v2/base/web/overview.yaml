###############################门铃监控################
  - type: image
    image: local/ui/SVG/cctv-running.svg
    entity: camera.doorbell_repeater_b679
    layout: icon_name
    show_icon: true
    show_name: false
    show_state: false
    name: 门铃监控
    tap_action:
      action: fire-dom-event
      browser_mod:
        service: browser_mod.popup
        data:
          timeout: 10000
          card_mod:
            style: |
              ha-dialog {
                --mdc-dialog-min-width: 70% !important;
                --mdc-dialog-max-width: 800px !important;
                --mdc-dialog-min-height: auto !important;
                --mdc-dialog-max-height: 90vh !important;
              }
          content:
            type: vertical-stack
            cards:
              - type: picture-entity
                entity: camera.doorbell_repeater_b679
                name: 门铃监控
                theme: ios-dark-mode-blue-red
                show_state: true
                show_name: true
                camera_view: live
                hold_action:
                  action: none
    style:
      top: 5%
      left: 7%
      width: 3.5%
      z-index: 3
    styles:
      icon:
        - margin-top: '-2.7px'
        - width: 18px
        - color: white
      name:
        - margin-left: '-20px'
        - font-size: 14px
        - font-weight: bold
        - color: white
      state:
        - margin-top: '-19.5px'
        - margin-left: 63px
        - font-size: 16px
        - font-weight: bold
      card:
        - background-color: transparent

