    name: 主卧温度
    entity: sensor.xiaomi_cn_blt_3_1lgn8eb4ok800_mini_temperature_p_2_1001
    style:
      left: 85%
      top: 75%
      z-index: 4
    styles:
      card:
        - background: transparent
        - box-shadow: none
        - border: none
        - font-size: 20px
        - color: black
        - text-align: center
        - overflow: visible
        - white-space: nowrap
        - min-width: 60px
        - width: auto
