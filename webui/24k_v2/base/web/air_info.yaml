type: custom:swipe-card
card_width: 300px
start_card: 1
style:
  top: 0%
  left: 0%
  width: 90%
  z-index: 3
parameters:
  slidesPerView: 1
  spaceBetween: 0
  grabCursor: true
  followFinger: true
  pagination: 
    type: none
  autoplay:
    delay: 6000
cards:


  - type: custom:mod-card
    style:
      .: |
        ha-card {
          padding: 3px !important;
        }
    card:
        type: vertical-stack
        cards:
          - type: custom:clock-weather-card
            entity: weather.chengdu
            hide_clock: true
            hide_date: true
            style: 
              width: 230px
              height: 400px
            card_mod:  
              style: |
                ha-card {
                  background-color: transparent !important; 
                  color: white !important;
                  box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.5); /* 可选：阴影效果 */
                  border-radius: 8px;
                  --bar-height: 0.5rem !important;
                  margin-top: 1px;
                  margin-left: 3px;
                  margin-right: 3px;
                  margin-buttom:10px;
                }
            tap_action:
              action: fire-dom-event
              browser_mod: 
                service: browser_mod.popup
                
                data: 
                  timeout: 5000
                  card_mod:
                    style: |
                      ha-dialog {
                        --mdc-dialog-max-width: 30% !important;
                      }
                  content:
                    type: grid
                    columns: 1
                    square: false
                    cards:
                      - type: custom:weather-card
                        entity: weather.chengdu
                        show_hour: true
                        show_daily: true
                        show_realtime: true 
                        icon: >-
                          /hacsfiles/lovelace-colorfulclouds-weather-card/icons/animated/
                        secondary_info_attribute: humidity
 
