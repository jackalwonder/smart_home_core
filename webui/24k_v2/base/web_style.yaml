botton_style1:
  show_entity_picture: true

  styles:
    card:
      
      - border-radius: 10px        
      - aspect-ratio: 16/9
      - background-color: var(--name-background-color, rgba(255, 255, 255, 0.1))
  
    grid:
      - grid-template-rows: minmax(100px, 1fr) auto
      # - grid-template-columns: 1fr
      # - grid-template-rows: 80% 20%

    entity_picture:
      - width: 25%
      - position: absolute
      - top: 1%
      - left: 50%
      - transform: translateX(-50%)
    name:
      - position: absolute
      - bottom: 0
      - left: 0
      - width: 100%
      - font-weight: bold
      - background-color: var(--name-background-color, rgba(34, 34, 34, 0.8))
      - font-size: var(--name-font-size, 15px)
      - text-align: center
  size: 50%
  
  card_mod:
    style: |
      ha-card {
        background: rgba(0, 0, 0, 0.5);
        font-size: 10px; /* 设置默认字体大小 */
      }
      

      



