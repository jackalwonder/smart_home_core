
decluttering_templates: !include ./base/declutteringweb.yaml
# 添加iframe兼容性CSS
resources:
  - url: /local/iframe-compatibility.css
    type: css
kiosk_mode: 
  entity_settings:
    - entity: 
        input_boolean.full_screen: 'on'
      hide_sidebar: true
      hide_header: true 
    - entity: 
        input_boolean.full_screen: 'off'
      hide_header: false
      hide_sidebar: false
views: 
  - title: 'home'
    path: 'home'  
    theme: transparent
    type: custom:grid-layout
        # 新增：背景图配置
    card_mod:
      background:
        opacity: 33
        alignment: center
        size: cover
        repeat: repeat
        attachment: fixed
        image: /local/background.png 
    cards:
      - type: custom:stack-in-card
        mode: vertical
        card_mod:
          style: |
            :host {
              --ha-card-background: none;
            } 
##################################卡片开始############################                                                                               
        cards:
          - type: conditional
            conditions:
              - entity: input_boolean.doorbell_popup
                state: 'on'
            card:
              type: custom:mod-card
              card_mod:
                style: |
                  ha-card {
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100vw;
                    height: 100vh;
                    z-index: 9999;
                    background-color: rgba(0,0,0,0.5);
                    backdrop-filter: blur(2em) brightness(0.75);
                    -webkit-backdrop-filter: blur(2em) brightness(0.75);
                    -moz-backdrop-filter: blur(2em) brightness(0.75);
                  }
                  ha-card > * {
                    position: fixed !important;
                    top: 20% !important;
                    left: 20% !important;
                    width: 60vw !important;
                    height: 60vh !important;
                    z-index: 10000 !important;
                    border-radius: 10px !important;
                    overflow: hidden !important;
                    background-color: rgba(0,0,0,0.9) !important;
                  }
              card:
                type: picture-entity
                entity: camera.doorbell_repeater_b679
                camera_view: live 
                name: 门口监控
                tap_action:
                  action: call-service
                  service: input_boolean.turn_off
                  service_data:
                    entity_id: input_boolean.doorbell_popup 
  

          - type: custom:tabbed-card
            view_layout: null 
            tabs:
              - attributes:
                  label: 总览
                  icon: mdi:home
                card:
                  type: custom:layout-card
                  layout_type: custom:grid-layout
                  layout:
                    width: 75%
                    left: 10%
                    max_cols: 1
                    margin: 0px 0px 0px 10px
                  card_mod:
                    style: |
                      :host {
                        padding-left: 0px !important; /* 使用 padding 代替 margin */
                        border: 3px solid red !important;
                        background-color: rgba(255,0,0,0.1) !important;
                      }
                      .grid-layout {
                        border: 3px solid blue !important;
                        background-color: rgba(0,0,255,0.1) !important;
                      }
                  cards:
                    - type: 'custom:layout-card'
                      layout_type: 'custom:grid-layout'
                      path: web
                      layout:  
                        grid-gap: 0px
                        grid-template-columns: 0px 210px 670px 425px
                        grid-template-rows: 30px 300px 300px 150px 120px
                        grid-template-areas: |
                          "one  two two five"
                          "one  four four three" 
                          "one  four four three"
                          "one  four four three"  
                          "line  line line line"  
                      cards: 
###########################第一区块###############################                                                                                                               
                        - type: grid 
                          square: false
                          view_layout:
                            grid-area: three    
                          columns: 1
                          style:
                            width: 300px 
                          card_mod:
                            style: |
                              :host {
                                border: 3px solid green !important;
                                background-color: rgba(0,255,0,0.1) !important;
                                height: 100% !important;
                              }
                          cards:
                            # - !include base/web/calendar.yaml
###########################第二区块###############################                  
                            - !include base/web/info.yaml 
                            
###########################第三区块###############################  
                            # - !include base/web/mini_graph.yaml                        
############################户型图################################                                                       
                        - type: 'custom:layout-card' 
                          layout_type: 'custom:masonry-layout' 
                          layout:
                            width: 580
                          view_layout:
                            grid-area: four
                          card_mod:
                            style: |
                              :host {
                                border: 3px solid orange !important;
                                background-color: rgba(255,165,0,0.1) !important;
                                height: 100% !important;
                                overflow: hidden !important;
                              }
                          cards: 
                            - type: custom:swipe-card
                              start_card: 1
                              card_mod:
                                style: |
                                  :host {
                                    --ha-card-background: 0;
                                    height: 100% !important;
                                    max-height: 100% !important;
                                    overflow: hidden !important;
                                    position: relative !important;
                                    border: 3px solid yellow !important;
                                    background-color: rgba(255,255,0,0.1) !important;
                                  } 
                              style:
                                top: 0%
                                left: 0%
                                width: 100%
                                height: 100%
                                max-height: 100%
                                z-index: 3
                              parameters:
                                slidesPerView: 1
                                spaceBetween: 0
                                grabCursor: true
                                followFinger: true
                                pagination: 
                                  type: none
                                # autoplay:
                                #   delay: 10000
                              cards:
                                - type: grid
                                  columns: 1
                                  card_mod:
                                    style: |
                                      ha-card {
                                        margin-left: -40%;
                                      }
                                      card {
                                        width: 580px;
                                      }
                                  cards:
                                    - !include base/web/overview.yaml
                                
                                # - type: custom:mod-card 
                                #   style:
                                #     .: |
                                #       ha-card {
                                #         padding-left: 3px !important;
                                #         padding-right: 3px !important;
                                #         padding-top: 100px !important;
                                #       }
                                #   card:
                                #       type: vertical-stack
                                #       cards:
                                #         - !include base/web/sensor_line_gauge.yaml
                                # # - !include base/web/sensor_line_gauge_1.yaml   
                        - type: custom:button-card                               
                          view_layout:
                            grid-area: line
                          styles:
                            card:
                              - width: 1320px    
                              - border-bottom: 1px solid white
                              - margin-top: -20px
                              - background-color: transparent
                              - border-radius: 0
                              - height: 2px !important
                              - min-height: 2px !important
                              - max-height: 2px !important
                              - z-index: 0
                              - padding: 0px !important
                              - line-height: 0 !important
                              - overflow: hidden !important
                              - display: block !important
                              - box-sizing: border-box !important
                              - z-index: 1
                        #   show_name: false 
                        #   show_icon: false
                        #   show_state: false 
    
                        - square: false
                          view_layout:
                            grid-area: line 
                          type: grid
                          card_mod:
                            style: |
                              :host {
                                z-index: 1000 !important;
                                position: relative !important;
                                height: 120px !important;
                                min-height: 120px !important;
                                max-height: 120px !important;
                                border: 3px solid purple !important;
                                background-color: rgba(128,0,128,0.2) !important;
                              }
                          cards:
                              - graph: line
                                type: sensor
                                entity: sensor.last_electricity_usage_6871_2
                                detail: 1
                                name: 日用电量统计
                              - graph: line
                                type: sensor
                                entity: sensor.month_electricity_charge_6871_2
                                detail: 1
                              - graph: line
                                type: sensor
                                entity: sensor.electricity_charge_balance_6871_2
                                detail: 1
                              - graph: line
                                type: sensor
                                entity: sensor.yearly_electricity_usage_6871_2
                                detail: 1
                              - graph: line
                                type: sensor
                                entity: sensor.yearly_electricity_charge_6871_2
                                detail: 1
                          columns: 5
                          styles:
                            card:
                              - z-index: 2
                          # style: 
                          #   .: |
                          #     ha-card {
                          #       width: 100%;
                          #       margin-left: 50px !important;
                          #       margin-top: 10px !important;
                          #       z-index: 1000 !important;
                          #       position: relative !important;
                          #       background-color: rgba(0,0,0,0.1) !important;
                          #       border-radius: 10px !important;
                          #       padding: 10px !important;
                          #     }


    
