
mini_graph_card_template:
  card:
    type: custom:mini-graph-card
    name: '[[name1]]'
    icon: '[[icon]]'
    entities:
      - entity: '[[entity1]]'
        name: '[[name2]]'
        show_state: true
        color_thresholds:
          - color: '#4dd2ff'
            value: 17
          - color: '#01a4db'
            value: 20
          - color: '#fccd68'
            value: 26
          - color: '#ff1a1a'
            value: 30
      - entity: '[[entity2]]'
        name: '[[name3]]'
        show_state: true
        color_thresholds:
          - color: '#4dd2ff'
            value: 35
          - color: '#01a4db'
            value: 50
          - color: '#fccd68'
            value: 70
          - color: '#ff1a1a'
            value: 80
    update_interval: 100
    show:
      icon: true
      legend: true
      name: true
flex_horseshoe_card_template:
  card:
    type: custom:flex-horseshoe-card
    entities:
      - entity: '[[entity1]]'
        name: 设备信息
        decimals: 0
        unit: °C
      - entity: '[[entity2]]'
        decimals: 0
        unit: '%'
      - entity: '[[entity3]]'
        decimals: 0
        unit: '%'
    show:
      horseshoe_style: colorstop
    layout:
      hlines:
        - id: 0
          xpos: 50
          ypos: 42
          length: 40
          styles:
            - stroke: var(--primary-text-color);
            - stroke-width: 5;
            - stroke-linecap: round;
            - opacity: 0.7;
            - background-color: rgb(35,35,42)
      states:
        - id: 0
          entity_index: 0
          xpos: 50
          ypos: 34
          styles:
            - font-size: 3em;
        - id: 1
          entity_index: 1
          xpos: 28
          ypos: 57
          styles:
            - text-anchor: start;
            - font-size: 1.3em;
        - id: 2
          entity_index: 2
          xpos: 28
          ypos: 72
          styles:
            - text-anchor: start;
            - font-size: 1.3em;
      names:
        - id: 0
          entity_index: 0
          xpos: 50
          ypos: 95
    horseshoe_scale:
      min: 0
      max: 100
      width: 10
    color_stops:
      '0': green
      '60': orange
      '80': red


