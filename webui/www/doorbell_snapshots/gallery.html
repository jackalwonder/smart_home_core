<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>门铃快照图库</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <!-- 确保在iframe中正常显示 -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!-- 防止移动端浏览器自动调整字体大小 -->
  <meta name="format-detection" content="telephone=no">
  <meta name="format-detection" content="email=no">
  <style>
    body { 
      font-family: "微软雅黑", Arial, sans-serif; 
      background: transparent; 
      margin: 0; 
      padding: 0; 
      /* 确保背景透明在iframe中生效 */
      background-color: transparent !important;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      /* 降级方案：先设置半透明背景 */
      background: rgba(255,255,255,0.35);
      /* 添加更多浏览器前缀的backdrop-filter */
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      -moz-backdrop-filter: blur(18px) saturate(160%);
      backdrop-filter: blur(18px) saturate(160%);
      /* 确保在移动端也能显示效果 */
      background: rgba(255,255,255,0.35);
      border-radius: 18px;
      box-shadow: 0 8px 32px 0 rgba(31,38,135,0.18);
      padding: 20px;
      border: 1.5px solid rgba(255,255,255,0.25);
      /* 添加transform来强制硬件加速 */
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      /* 使用flexbox布局 */
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    /* 为不支持backdrop-filter的浏览器提供降级方案 */
    @supports not (backdrop-filter: blur(1px)) {
      .container {
        background: rgba(255,255,255,0.9);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        -moz-backdrop-filter: none;
      }
    }
    /* 左侧日历区域 */
    .calendar-section {
      flex: 0 0 320px;
      min-width: 320px;
      margin-top: 100px;
    }
    /* 右侧图片浏览区域 */
    .image-section {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .main-img { 
      width: 80%; 
      border-radius: 8px; 
      box-shadow: 0 2px 8px #0001; 
      margin-bottom: 10px; 
      cursor: zoom-in; 
      max-height: 60vh;
      object-fit: contain;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .controls { 
      text-align: center; 
      margin-bottom: 10px; 
    }
    .controls button { 
      background: #007bff; 
      color: #fff; 
      border: none; 
      border-radius: 4px; 
      padding: 8px 18px; 
      margin: 0 8px; 
      font-size: 16px; 
      cursor: pointer; 
    }
    .controls button:disabled { 
      background: #ccc; 
      cursor: not-allowed; 
    }
    .img-name { 
      text-align: center; 
      color: #ffffff; 
      font-size: 15px; 
      margin-bottom: 10px; 
    }
    .thumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-bottom: 6px;
      justify-content: center;
      max-height: 120px;
      overflow-y: auto;
    }
    .thumbs img {
      height: 48px;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0.7;
      border: 2px solid transparent;
      transition: border 0.2s, opacity 0.2s;
      margin: 2px;
    }
    .thumbs img.active { 
      border: 2px solid #007bff; 
      opacity: 1; 
    }
    .loading { 
      text-align:center; 
      color:#007bff; 
      font-size:16px; 
      margin:10px 0; 
    }
    .calendar-box {
      background:#fff;
      border-radius:20px;
      box-shadow:0 4px 24px #0002;
      padding:24px 20px 16px 20px;
      margin-bottom:10px;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .calendar-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
      width:100%;
    }
    .calendar-header button {
      background:#f0f4ff;
      border:none;
      font-size:20px;
      cursor:pointer;
      padding:6px 12px;
      border-radius:12px;
      transition:background 0.2s;
      margin:0 2px;
    }
    .calendar-header button:hover { 
      background:#e0eaff; 
    }
    .calendar-title { 
      font-weight:bold;
      font-size:22px; 
      letter-spacing:1px; 
    }
    .calendar-grid {
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:4px;
      width:100%;
    }
    .calendar-cell {
      padding:12px 0;
      text-align:center;
      cursor:pointer;
      border-radius:10px;
      position:relative;
      transition:background 0.2s, color 0.2s;
      font-size:16px;
      font-weight:500;
      min-width:32px;
      min-height:32px;
      user-select:none;
    }
    .calendar-cell.has-dot::after {
      content:'';
      position:absolute;
      left:50%;
      bottom:6px;
      transform:translateX(-50%);
      width:8px;
      height:8px;
      background:#2ecc40;
      border-radius:50%;
    }
    .calendar-cell.selected {
      background:#007bff;
      color:#fff;
      font-weight:bold;
      box-shadow:0 2px 8px #007bff22;
    }
    .calendar-cell:hover { 
      background:#e6f0ff; 
    }
    .calendar-weekdays {
      color:#888;
      font-size:14px;
      text-align:center;
      display:grid;
      grid-template-columns:repeat(7,1fr);
      margin-bottom:2px;
      font-weight:600;
      letter-spacing:1px;
    }
    /* 移动端特殊处理 */
    @media (max-width: 768px) {
      .container {
        /* 移动端使用更简单的效果 */
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        -moz-backdrop-filter: blur(10px);
        /* 确保在移动端iframe中正常显示 */
        position: relative;
        z-index: 1;
        flex-direction: column;
        padding: 10px;
      }
      .calendar-section {
        flex: none;
        width: 100%;
        min-width: 0;
      }
      .image-section {
        width: 100%;
      }
    }
    /* 针对iframe的特殊处理 */
    @media (max-width: 600px) {
      .container { 
        max-width: 98vw; 
        padding: 8px; 
        /* 移动端iframe中的额外优化 */
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        -moz-backdrop-filter: blur(8px);
        flex-direction: column;
      }
      .calendar-box { 
        width:98vw; 
        min-width:0; 
        padding:10px 2vw 10px 2vw; 
      }
      .calendar-title { 
        font-size:18px; 
      }
      .calendar-header button { 
        font-size:16px; 
        padding:4px 8px; 
      }
      .calendar-cell { 
        font-size:14px; 
        min-width:24px; 
        min-height:24px; 
        padding:7px 0; 
      }
      .calendar-weekdays { 
        font-size:12px; 
      }
      .main-img { 
        max-height: 40vh; 
      }
    }
    /* 全屏预览样式 */
    .fullscreen-bg {
      position: fixed; 
      left:0; 
      top:0; 
      width:100vw; 
      height:100vh; 
      background:rgba(0,0,0,0.85); 
      z-index:9999; 
      display:flex; 
      align-items:center; 
      justify-content:center;
    }
    .fullscreen-img { 
      max-width:96vw; 
      max-height:96vh; 
      border-radius:12px; 
      box-shadow:0 4px 32px #0008; 
    }
    .img-tip {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(60,60,60,0.65);
      color: #fff;
      padding: 12px 32px;
      border-radius: 18px;
      font-size: 20px;
      font-weight: bold;
      z-index: 999;
      pointer-events: none;
      text-align: center;
      box-shadow: 0 2px 12px #0003;
      letter-spacing: 2px;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>
  <main class="container">
    <!-- 左侧日历 -->
    <aside class="calendar-section">
      <div id="calendar"></div>
    </aside>
    
    <!-- 右侧图片浏览区 -->
    <section class="image-section">
      <nav class="controls">
        <button id="prevBtn">← 上一张</button>
        <span id="counter">0 / 0</span>
        <button id="nextBtn">下一张 →</button>
      </nav>
      <div style="position:relative;">
        <img id="mainImg" class="main-img" src="" alt="门铃快照" style="display:none;">
        <div id="loading" class="loading" style="display:none;">加载中...</div>
        <div id="imgTip" class="img-tip" style="display:none;">这是最新的一张了</div>
      </div>
      <div class="img-name" id="imgName"></div>
      <div class="thumbs" id="thumbs"></div>
      <div id="msg" style="text-align:center;color:#c00;margin-top:10px;"></div>
    </section>
  </main>
  <div id="fullscreen" style="display:none;"></div>
  <script>
    // 变量声明
    const mainImg = document.getElementById('mainImg');
    const imgName = document.getElementById('imgName');
    const thumbs = document.getElementById('thumbs');
    const counter = document.getElementById('counter');
    const msg = document.getElementById('msg');
    const loading = document.getElementById('loading');
    const fullscreen = document.getElementById('fullscreen');
    const imgTip = document.getElementById('imgTip');
    let images = [];
    let idx = 0;
    let availableDates = [];
    let dateToListFile = {};
    let selectedDate = null;
    let allMonths = [];
    let monthIdx = 0;

    // 日历渲染函数，支持月份切换
    function renderCalendar(dates, monthStr) {
      const cal = document.getElementById('calendar');
      cal.innerHTML = '';
      const dots = {};
      dates.forEach(d => { dots[d] = true; });
      const [yyyy, mm] = monthStr.split('-');
      const daysInMonth = new Date(yyyy, mm, 0).getDate();
      const firstDay = new Date(`${monthStr}-01`).getDay();
      let html = `<div class='calendar-box'>`;
      html += `<div class='calendar-header'>
        <button onclick='changeMonth(-1)'>&lt;</button>
        <span class='calendar-title'>${yyyy}年${mm}月</span>
        <button onclick='changeMonth(1)'>&gt;</button>
      </div>`;
      html += `<div class='calendar-grid calendar-weekdays'><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>`;
      html += `<div class='calendar-grid'>`;
      for(let i=0;i<firstDay;i++) html += `<div></div>`;
      for(let d=1;d<=daysInMonth;d++) {
        const dateStr = `${yyyy}-${mm}-${String(d).padStart(2,'0')}`;
        let cls = 'calendar-cell';
        if(dots[dateStr]) cls += ' has-dot';
        if(dateStr === selectedDate) cls += ' selected';
        html += `<div class='${cls}' onclick='selectDate("${dateStr}")'>${d}</div>`;
      }
      html += `</div></div>`;
      cal.innerHTML = html;
    }
    // 切换月份
    window.changeMonth = function(delta) {
      monthIdx += delta;
      if(monthIdx < 0) monthIdx = 0;
      if(monthIdx >= allMonths.length) monthIdx = allMonths.length-1;
      renderCalendar(availableDates.filter(d=>d.startsWith(allMonths[monthIdx])), allMonths[monthIdx]);
    }
    // 选择日期
    window.selectDate = function(dateStr) {
      selectedDate = dateStr;
      const monthStr = dateStr.slice(0,7);
      monthIdx = allMonths.indexOf(monthStr);
      renderCalendar(availableDates.filter(d=>d.startsWith(monthStr)), monthStr);
      if(dateToListFile[dateStr]) {
        loadListByFile(dateToListFile[dateStr]);
      } else {
        images = [];
        updateThumbs();
        showImage(0);
        msg.textContent = '该日期暂无快照图片';
      }
    }
    // 主图显示
    function showImage(i) {
      if (images.length === 0) {
        mainImg.style.display = 'none';
        imgName.textContent = '';
        counter.textContent = '0 / 0';
        return;
      }
      idx = i;
      loading.style.display = '';
      mainImg.style.display = 'none';
      mainImg.onload = () => {
        loading.style.display = 'none';
        mainImg.style.display = '';
      };
      mainImg.src = images[idx];
      const fname = images[idx].split('/').pop();
      const m = fname.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/);
      if (m) {
        imgName.textContent = `${m[1]}-${m[2]}-${m[3]} ${m[4]}:${m[5]}:${m[6]}`;
      } else {
        imgName.textContent = fname;
      }
      counter.textContent = (idx+1) + ' / ' + images.length;
      Array.from(thumbs.children).forEach((img, j) => {
        img.classList.toggle('active', j === idx);
      });
    }
    // 缩略图渲染，懒加载
    function updateThumbs() {
      thumbs.innerHTML = '';
      images.forEach((url, i) => {
        const t = document.createElement('img');
        t.src = url;
        t.loading = 'lazy'; // 懒加载
        t.className = i === idx ? 'active' : '';
        t.onclick = () => showImage(i);
        thumbs.appendChild(t);
      });
    }
    document.getElementById('prevBtn').onclick = () => {
      if (images.length === 0) return;
      if (idx === 0) {
        showImgTip('这是最新的一张了');
        return;
      }
      hideImgTip();
      showImage(idx - 1);
    };
    document.getElementById('nextBtn').onclick = () => {
      if (images.length === 0) return;
      if (idx === images.length - 1) {
        showImgTip('这是最早的一张了');
        return;
      }
      hideImgTip();
      showImage(idx + 1);
    };
    // 主图点击全屏
    mainImg.onclick = function() {
      if (!mainImg.src) return;
      fullscreen.innerHTML = `<div class='fullscreen-bg' onclick='closeFullscreen(event)'><img class='fullscreen-img' src='${mainImg.src}' alt='全屏预览'></div>`;
      fullscreen.style.display = '';
      document.body.style.overflow = 'hidden';
    };
    window.closeFullscreen = function(e) {
      if (e.target.classList.contains('fullscreen-bg')) {
        fullscreen.style.display = 'none';
        fullscreen.innerHTML = '';
        document.body.style.overflow = '';
      }
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
      if (e.key === 'ArrowRight') document.getElementById('nextBtn').click();
      if (e.key === 'Escape' && fullscreen.style.display !== 'none') {
        fullscreen.style.display = 'none';
        fullscreen.innerHTML = '';
        document.body.style.overflow = '';
      }
    });
    // 加载 lists.json，生成日历和映射
    fetch('lists.json?' + Date.now())
      .then(r => r.json())
      .then(listFiles => {
        if (!Array.isArray(listFiles) || listFiles.length === 0) {
          msg.textContent = '没有可用的快照列表';
          return;
        }
        availableDates = [];
        dateToListFile = {};
        listFiles.forEach(f => {
          const date = f.match(/list-(\d{4}-\d{2}-\d{2})\.txt/);
          if(date && date[1]) {
            availableDates.push(date[1]);
            dateToListFile[date[1]] = f;
          }
        });
        allMonths = Array.from(new Set(availableDates.map(d=>d.slice(0,7)))).sort().reverse();
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        const todayStr = `${yyyy}-${mm}-${dd}`;
        selectedDate = availableDates.includes(todayStr) ? todayStr : availableDates[0];
        monthIdx = allMonths.indexOf(selectedDate.slice(0,7));
        renderCalendar(availableDates.filter(d=>d.startsWith(allMonths[monthIdx])), allMonths[monthIdx]);
        if(selectedDate) selectDate(selectedDate);
      })
      .catch(e => {
        msg.textContent = '加载快照列表索引失败: ' + e;
      });
    // 加载指定list文件
    function loadListByFile(listFile) {
      msg.textContent = '';
      loading.style.display = '';
      fetch(listFile + '?' + Date.now())
        .then(r => r.text())
        .then(txt => {
          images = txt.split('\n').map(x=>x.trim()).filter(x=>x.endsWith('.jpg')||x.endsWith('.jpeg')||x.endsWith('.png'));
          // 按文件名倒序排列，最新的在前面
          images.sort((a, b) => {
            const aName = a.split('/').pop();
            const bName = b.split('/').pop();
            return bName.localeCompare(aName);
          });
          if (images.length === 0) {
            msg.textContent = '该日期暂无快照图片';
            thumbs.innerHTML = '';
            mainImg.style.display = 'none';
            imgName.textContent = '';
            counter.textContent = '0 / 0';
            loading.style.display = 'none';
            return;
          }
          msg.textContent = '';
          updateThumbs();
          showImage(0);
        })
        .catch(e => {
          msg.textContent = '加载图片列表失败: ' + e;
          thumbs.innerHTML = '';
          mainImg.style.display = 'none';
          imgName.textContent = '';
          counter.textContent = '0 / 0';
          loading.style.display = 'none';
        });
    }
    // 定时每2分钟自动刷新页面
    setInterval(() => {
      if (selectedDate) {
        fetch('lists.json?' + Date.now())
          .then(r => r.json())
          .then(listFiles => {
            let hasNew = false;
            listFiles.forEach(f => {
              const date = f.match(/list-(\\d{4}-\\d{2}-\\d{2})\\.txt/);
              if(date && date[1] && !availableDates.includes(date[1])) hasNew = true;
            });
            if (hasNew) location.reload();
            else if (dateToListFile[selectedDate]) loadListByFile(dateToListFile[selectedDate]);
          });
      }
    }, 2 * 60 * 1000);
    function showImgTip(text) {
      imgTip.textContent = text;
      imgTip.style.display = '';
      imgTip.style.opacity = '1';
      setTimeout(() => {
        imgTip.style.opacity = '0';
        setTimeout(() => { imgTip.style.display = 'none'; }, 400);
      }, 1500);
    }
    function hideImgTip() {
      imgTip.style.display = 'none';
      imgTip.style.opacity = '0';
    }
  </script>
</body>
</html>
