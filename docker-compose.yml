services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: smart-home-homeassistant
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - homeassistant_config:/config
    ports:
      - "${HOME_ASSISTANT_PORT:-8123}:8123"

  db:
    image: postgres:15
    container_name: smart-home-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_home}
      POSTGRES_USER: ${POSTGRES_USER:-smart_home_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-smart_home_user} -d ${POSTGRES_DB:-smart_home}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./backend
    container_name: smart-home-backend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: ${POSTGRES_DB:-smart_home}
      POSTGRES_USER: ${POSTGRES_USER:-smart_home_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-smart_home_user}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-smart_home}
      HOME_ASSISTANT_WS_URL: ${HOME_ASSISTANT_WS_URL:-ws://homeassistant:8123/api/websocket}
      HOME_ASSISTANT_REST_URL: ${HOME_ASSISTANT_REST_URL:-http://homeassistant:8123/api}
      HOME_ASSISTANT_ACCESS_TOKEN: ${HOME_ASSISTANT_ACCESS_TOKEN:-}
      HOME_ASSISTANT_TTS_ENTITY_ID: ${HOME_ASSISTANT_TTS_ENTITY_ID:-}
      HOME_ASSISTANT_TTS_MEDIA_PLAYER: ${HOME_ASSISTANT_TTS_MEDIA_PLAYER:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      APP_READ_API_KEY: ${APP_READ_API_KEY:-}
      APP_CONTROL_API_KEY: ${APP_CONTROL_API_KEY:-}
      APP_ADMIN_API_KEY: ${APP_ADMIN_API_KEY:-}
      APP_AUTH_COOKIE_SECRET: ${APP_AUTH_COOKIE_SECRET:-}
      APP_WEBHOOK_SECRET: ${APP_WEBHOOK_SECRET:-}
      APP_WEBHOOK_MAX_SKEW_SECONDS: ${APP_WEBHOOK_MAX_SKEW_SECONDS:-300}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    volumes:
      - backend_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8000/api/health || exit 1"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    container_name: smart-home-frontend
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_READ_API_KEY: ${APP_READ_API_KEY:-}
      BACKEND_UPSTREAM: ${FRONTEND_BACKEND_UPSTREAM:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  homeassistant_config:
  postgres_data:
  backend_data:
